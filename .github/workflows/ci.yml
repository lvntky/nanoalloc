name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcriterion-dev lcov llvm

      - name: Create llvm-cov wrapper
        run: |
          echo '#!/bin/bash' | sudo tee /usr/local/bin/llvm-gcov
          echo 'exec llvm-cov gcov "$@"' | sudo tee -a /usr/local/bin/llvm-gcov
          sudo chmod +x /usr/local/bin/llvm-gcov

      - name: Build
        run: make

      - name: Run tests
        run: make test
        env:
          LD_LIBRARY_PATH: build

      - name: Generate coverage
        run: make coverage
        env:
          LD_LIBRARY_PATH: build

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: build/coverage.info
          token: ${{ secrets.CODECOV_TOKEN }}